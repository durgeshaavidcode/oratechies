<!doctype html>
<html lang="en-IN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Oratechies - Login | The Home of Oracle Careers</title>
		<meta
			name="description"
			content="Login to Oratechies, the home of Oracle careers. Find 100% Oracle jobs from verified recruiters with zero candidate fees."
		/>
		<meta
			name="keywords"
			content="Oracle jobs, Oracle careers, Oratechies, Oracle recruitment, Oracle ERP jobs, Oracle cloud jobs, Oracle DBA jobs"
		/>
		<meta name="author" content="Oratechies" />
		<meta name="robots" content="index, follow" />

		<!-- Open Graph / Social Media -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Oratechies - The Home of Oracle Careers" />
		<meta
			property="og:description"
			content="Login to continue your Oracle career journey. 100% Oracle Jobs, Verified Recruiters, Zero Candidate Fees."
		/>
		<meta property="og:site_name" content="Oratechies" />
		<meta property="og:url" content="https://www.oratechies.com/login" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Oratechies - The Home of Oracle Careers" />
		<meta
			name="twitter:description"
			content="Login to continue your Oracle career journey. 100% Oracle Jobs, Verified Recruiters, Zero Candidate Fees."
		/>

		<!-- Canonical URL -->
		<link rel="canonical" href="https://www.oratechies.com/login" />

		<!-- Preconnect for Google Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
			rel="stylesheet"
		/>

		<!-- Structured Data -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "WebSite",
				"name": "Oratechies",
				"url": "https://www.oratechies.com",
				"description": "The Home of Oracle Careers - 100% Oracle Jobs, Verified Recruiters, Zero Candidate Fees",
				"potentialAction": {
					"@type": "SearchAction",
					"target": "https://www.oratechies.com/search?q={search_term_string}",
					"query-input": "required name=search_term_string"
				}
			}
		</script>
	</head>

	<body>
		<noscript>You need to enable JavaScript to run this app.</noscript>
		<div id="_oratechies-root"></div>

		<script type="module" src="/src/index.jsx"></script>
	</body>
</html>
