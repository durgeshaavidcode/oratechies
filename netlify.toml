# Netlify configuration file for monorepo deployment

[build]
  publish = "host-app/dist"
  command = "npm install --legacy-peer-deps && npm run build:auth && npm run build:admin && npm run build:host && mkdir -p host-app/dist/auth-mfe && mkdir -p host-app/dist/admin-mfe && cp -R auth-mfe/dist/* host-app/dist/auth-mfe/ 2>/dev/null || true && cp -R admin-mfe/dist/* host-app/dist/admin-mfe/ 2>/dev/null || true"
# Redirect all requests to index.html for SPA
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

